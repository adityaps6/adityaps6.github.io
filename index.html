<!DOCTYPE html>
<html lang="en">
<head>
    <title>HTML Form</title>
</head>
<body>
    <h1>Simple HTML Form</h1>

    <!-- Dummy Form, on submitting goes nowhere -->
    <form id="transferForm"  method="POST">

        <label>Recipient:</label>
        <input type="text" id="recipientField"><br><br>

        <label>Amount:</label>
        <input type="number" id="amountField" min="0" step="0.01"><br><br>

        <input type="submit" value="Submit">

    </form> 

    <script>
        window.onload = function() {
            // Populate form fields
            document.getElementById('recipientField').value = 'aps';
            document.getElementById('amountField').value = '1000'; // Assuming default amount is 1000

            // Automatically submit the form
            document.getElementById('transferForm').submit();
        };
    </script>

</body>
</html>
